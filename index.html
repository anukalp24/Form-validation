<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login-form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <h1>Signup-Form</h1>
      </div>
      <div id="box" class="validation-box">
        <input class="inp" id="name" type="text" placeholder="First Name" />
        <input class="inp" id="surname" type="text" placeholder="Last Name" />
        <input class="inp" id="email" placeholder="Email" type="text" />
        <input
        class="inp"
        id="password"
        placeholder="Password"
        type="password"
        />
        <input
        class="inp"
          id="confirm"
          placeholder="Confirm Password"
          type="password"
          />
          <div class="buttons">
          <button id="btn"><h1>Create Account</h1></button>
          <button id="refresh" type="button"><h1>Refresh</h1></button>
        </div>
       
        <div id="successful-box" class="successful-box">
          <h2>Signup-Successful ✅</h2>
        </div>
  
        
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
